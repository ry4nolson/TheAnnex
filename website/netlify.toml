[build]
  command = "npm run build"
  publish = "build/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=60, stale-while-revalidate=300"

[dev]
  command = "react-router dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"
  publish = "public"
