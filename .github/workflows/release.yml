name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist
          echo "Version set to $VERSION"

      - name: Build app bundle
        run: |
          set -euo pipefail

          APP_NAME="TheAnnex"
          EXEC_NAME="TheAnnex"
          BUILD_DIR=".build"
          APP_BUNDLE="$BUILD_DIR/$APP_NAME.app"
          CONTENTS="$APP_BUNDLE/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          echo "==> Creating app bundle structure..."
          mkdir -p "$MACOS" "$RESOURCES"

          echo "==> Compiling Swift files..."
          swiftc \
            main.swift \
            Models/NASState.swift \
            Models/NASDevice.swift \
            Models/SyncFolder.swift \
            Models/SyncJob.swift \
            Models/ActivityEntry.swift \
            Models/Statistics.swift \
            Utilities/ShellHelper.swift \
            Utilities/RsyncWrapper.swift \
            Utilities/NetworkDetector.swift \
            Utilities/NASDiscovery.swift \
            Utilities/KeychainHelper.swift \
            Utilities/AnnexQuotes.swift \
            Controllers/AppState.swift \
            Controllers/SyncEngine.swift \
            Controllers/NASMonitor.swift \
            Controllers/AppDelegate.swift \
            Controllers/MainWindowController.swift \
            Views/GeneralSettingsView.swift \
            Views/SyncFoldersView.swift \
            Views/ActivityLogView.swift \
            Views/StatisticsView.swift \
            Views/AdvancedSettingsView.swift \
            Views/AboutView.swift \
            -o "$MACOS/$EXEC_NAME" \
            -framework Cocoa \
            -framework UserNotifications \
            -framework SwiftUI \
            -framework Combine \
            -framework Charts \
            -framework CoreWLAN \
            -framework IOKit \
            -framework Security \
            -framework UniformTypeIdentifiers \
            -framework Network

          echo "==> Copying Info.plist..."
          cp Info.plist "$CONTENTS/Info.plist"

          echo "==> Building app icon..."
          ICONSET_DIR="AppIcon.appiconset"
          if [ -d "$ICONSET_DIR" ]; then
            ICONSET_TMP="$BUILD_DIR/AppIcon.iconset"
            mkdir -p "$ICONSET_TMP"
            cp "$ICONSET_DIR/16.png" "$ICONSET_TMP/icon_16x16.png"
            cp "$ICONSET_DIR/32.png" "$ICONSET_TMP/icon_16x16@2x.png"
            cp "$ICONSET_DIR/32.png" "$ICONSET_TMP/icon_32x32.png"
            cp "$ICONSET_DIR/64.png" "$ICONSET_TMP/icon_32x32@2x.png"
            cp "$ICONSET_DIR/128.png" "$ICONSET_TMP/icon_128x128.png"
            cp "$ICONSET_DIR/256.png" "$ICONSET_TMP/icon_128x128@2x.png"
            cp "$ICONSET_DIR/256.png" "$ICONSET_TMP/icon_256x256.png"
            cp "$ICONSET_DIR/512.png" "$ICONSET_TMP/icon_256x256@2x.png"
            cp "$ICONSET_DIR/512.png" "$ICONSET_TMP/icon_512x512.png"
            cp "$ICONSET_DIR/1024.png" "$ICONSET_TMP/icon_512x512@2x.png"
            iconutil -c icns -o "$RESOURCES/AppIcon.icns" "$ICONSET_TMP"
            rm -rf "$ICONSET_TMP"
            cp "$ICONSET_DIR/256.png" "$RESOURCES/AppIcon.png"
          fi

          # Copy sponsor logos
          if [ -d "TexasBeardCo" ]; then
            cp TexasBeardCo/HorizontalLogo.png "$RESOURCES/SponsorLogo.png"
            cp TexasBeardCo/HorizontalLogoWhite.png "$RESOURCES/SponsorLogoWhite.png"
          fi

          echo "==> Code signing app bundle..."
          codesign --force --deep --sign - "$APP_BUNDLE"

          echo "==> Creating release zip..."
          cd "$BUILD_DIR"
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME.zip"

          echo "✓ Build complete: $BUILD_DIR/$APP_NAME.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheAnnex
          path: .build/TheAnnex.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/TheAnnex.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
